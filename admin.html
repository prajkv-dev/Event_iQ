<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard — EventIQ</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="app.js"></script>
</head>
<body>
<header class="header">
  <div class="brand"><a href="index.html" style="text-decoration: none;color: var(--white);">Event<span class="accent">IQ</span></a></div>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="features.html">Features</a>
    <a href="userflow.html">User Flow</a>
    <a href="techstack.html">Tech Stack</a>
    <a href="architecture.html">Architecture</a>
    <a href="passes.html">Entry Passes</a>
    <a href="monitor.html">Crowd Monitor</a>
    <a href="navigation.html">AR Navigation</a>
    <a href="medic.html">Medic</a>
    <a href="alerts.html">Alerts</a>
    <a class="active" href="admin.html">Admin</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main class="container">
  <h1>Admin Dashboard</h1>
  <div class="grid">
    <div class="card">
      <h3>Gate Performance</h3>
      <canvas id="gateChart" width="360" height="180"></canvas>
    </div>
    <div class="card">
      <h3>Density Thresholds</h3>
      <label>Max per zone
        <input type="number" id="maxZone" value="75" />
      </label>
      <button id="saveThresholds" class="btn btn-primary">Save</button>
      <p id="thresholdStatus" class="status"></p>
    </div>
    <div class="card">
      <h3>Broadcast Message</h3>
      <textarea id="broadcastMsg" rows="4" placeholder="Type message to visitors..."></textarea>
      <button id="sendBroadcast" class="btn btn-outline">Send</button>
      <p id="broadcastStatus" class="status"></p>
    </div>
  </div>
</main>

<footer class="footer">© 2026 EventIQ</footer>
</body>
</html>
